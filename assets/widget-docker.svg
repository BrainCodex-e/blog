<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Docker widget">
  <title>Docker</title>
  <style>
    .stroke { stroke: var(--md-default-fg-color); }
    .fill { fill: var(--md-default-fg-color); }
    .bg { fill: var(--md-default-bg-color); }
  </style>

  <rect x="12" y="12" width="232" height="232" rx="28" class="bg" opacity="0.9"/>
  <rect x="12" y="12" width="232" height="232" rx="28" fill="none" class="stroke" opacity="0.18" stroke-width="6"/>

  <!-- simple whale + containers (stylized, not the Docker logo) -->
  <g fill="none" class="stroke" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M56 152c0 28 22 50 50 50h66c24 0 44-16 50-38 4-14 0-28-10-38-10-10-22-14-36-12-10-14-26-22-44-22-30 0-54 22-56 50z" opacity="0.9"/>
    <path d="M188 126c10 6 18 18 18 30" opacity="0.7"/>

    <!-- container stacks -->
    <path d="M72 112h24v24H72z"/>
    <path d="M104 104h24v32h-24z"/>
    <path d="M136 112h24v24h-24z"/>

    <!-- tiny waves -->
    <path d="M72 196c10 8 22 8 32 0 10 8 22 8 32 0 10 8 22 8 32 0" opacity="0.35"/>
  </g>

  <!-- eye -->
  <circle cx="96" cy="150" r="5" class="fill" opacity="0.9"/>
</svg>
