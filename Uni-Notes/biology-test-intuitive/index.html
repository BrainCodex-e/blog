<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>סיכום אינטואיטיבי למבחן בביולוגיה</title>
  <link rel="icon" href="../../assets/favicon.png">
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      background: #f7f7f8;
      color: #202124;
    }
    header {
      background: #1f2937;
      color: white;
      padding: 1rem clamp(1rem, 4vw, 3rem);
    }
    header a { color: #dbeafe; text-decoration: none; }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: clamp(1rem, 4vw, 3rem);
      background: white;
      min-height: 100vh;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-family: inherit;
      font-size: 1rem;
      margin: 0;
    }
    .status { color: #6b7280; }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #e5e7eb; }
      main { background: #0f172a; }
      header { background: #020617; }
      .status { color: #9ca3af; }
    }
  </style>
</head>
<body>
  <header>
    <a href="../../">← Back to blog</a>
  </header>
  <main>
    <pre id="content" class="status">Loading biology summary...</pre>
  </main>
  <script>
    const target = document.getElementById('content');
    const rawUrl = 'https://raw.githubusercontent.com/BrainCodex-e/blog/master/docs/Uni-Notes/biology-test-intuitive.md';
    fetch(rawUrl)
      .then(response => {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.text();
      })
      .then(markdown => {
        target.className = '';
        target.textContent = markdown;
      })
      .catch(error => {
        target.textContent = 'Could not load the summary. Open the source Markdown here:\n' + rawUrl + '\n\n' + error.message;
      });
  </script>
</body>
</html>
