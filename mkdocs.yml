site_name: erez site
site_url: https://braincodex-e.github.io/blog/

nav:
  - Home: index.md
  - About: about.md
  - Tags: tags.md
  - Biology: biology.md
  - DevOps:
      - Overview: devops/index.md
      - Docker: devops/docker.md
      - Python venv: devops/venv.md
 
  - Platform IO:
      - Overview: platformio/index.md
      - Setup Guide: platformio/setup.md

# Theme configuration

theme:
  name: material
  features:
    - content.code.annotate
    - content.code.copy
    - content.code.expand
    - content.tabs.link
    - content.tooltips
    - content.code.highlight
    - content.code.render  # <-- this enables Mermaid rendering
  favicon: assets/favicon.png
  logo: assets/favicon.png

# Markdown extensions (deduplicated and cleaned up)
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist
  - pymdownx.keys
  - pymdownx.mark
  - attr_list
  - admonition
  - footnotes
  - def_list
  - md_in_html
  - pymdownx.arithmatex

# Plugins
plugins:
  - search
  - tags:
      tags_file: tags.md
